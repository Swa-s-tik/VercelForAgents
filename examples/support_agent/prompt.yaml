# support_agent — a streaming, tool-calling customer support agent
name: support-agent
model: claude-opus-4-8
task: customer-support
entrypoint: agent.py
kind: support          # provision the streaming SupportAgent backend
streaming: true        # push runs the Go-gateway streaming proof (chunked TextDelta + ToolCall)
