# The whole agentctl stack in one command:  docker compose up --build
# (Postgres system-of-record + the Go data-plane gateway + the Python control plane.)
name: agentctl

x-pg-dsn: &pg_dsn postgresql://agentctl:agentctl@postgres:5432/agentctl

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: agentctl
      POSTGRES_PASSWORD: agentctl
      POSTGRES_DB: agentctl
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentctl -d agentctl"]
      interval: 2s
      timeout: 3s
      retries: 30

  # one-shot: apply the control-plane schema before the gateway/control plane start
  schema-init:
    build:
      context: .
      dockerfile: deploy/Dockerfile.controlplane
    command: ["agentctl", "rollback", "schema"]
    environment:
      AGENTCTL_PG_DSN: *pg_dsn
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  gateway:
    build:
      context: .
      dockerfile: deploy/Dockerfile.gateway
    environment:
      AGENTCTL_PG_DSN: *pg_dsn
      AGENTCTL_PROJECT_ID: "00000000-0000-0000-0000-0000000000a1"
      AGENTCTL_GW_PORT: "50050"
    ports:
      - "50050:50050"
    depends_on:
      postgres:
        condition: service_healthy
      schema-init:
        condition: service_completed_successfully

  controlplane:
    build:
      context: .
      dockerfile: deploy/Dockerfile.controlplane
    environment:
      AGENTCTL_PG_DSN: *pg_dsn
    ports:
      - "8088:8088"
    depends_on:
      postgres:
        condition: service_healthy
      schema-init:
        condition: service_completed_successfully

  # ----- optional telemetry warehouse + dashboards (Workstream 3) -----
  # Off by default; bring up with:  docker compose --profile telemetry up -d
  # The default 5-minute path stays plain Postgres (TELEMETRY_BACKEND=postgres).
  clickhouse:
    image: clickhouse/clickhouse-server:24.3
    profiles: ["telemetry"]
    environment:
      CLICKHOUSE_DB: agentctl
      CLICKHOUSE_USER: agentctl
      CLICKHOUSE_PASSWORD: agentctl
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    ports:
      - "8123:8123"   # HTTP (the native exporter)
      - "9000:9000"   # native (Grafana datasource)
    ulimits:
      nofile: { soft: 262144, hard: 262144 }
    volumes:
      - ./deploy/clickhouse/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8123/ping || exit 1"]
      interval: 3s
      timeout: 3s
      retries: 30

  grafana:
    image: grafana/grafana:11.1.0
    profiles: ["telemetry"]
    environment:
      GF_SECURITY_ADMIN_PASSWORD: agentctl
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_INSTALL_PLUGINS: grafana-clickhouse-datasource
    ports:
      - "3001:3000"   # host 3001 -> grafana 3000 (avoid common :3000 dev-server clashes)
    volumes:
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deploy/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      clickhouse:
        condition: service_healthy
