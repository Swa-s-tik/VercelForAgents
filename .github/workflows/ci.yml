name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  python:
    name: Python tests (control plane)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16   # superset of pg16; the pgvector state backend needs it
        env:
          POSTGRES_USER: agentctl
          POSTGRES_PASSWORD: agentctl
          POSTGRES_DB: agentctl
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U agentctl -d agentctl"
          --health-interval 2s --health-timeout 3s --health-retries 30
    env:
      AGENTCTL_PG_DSN: postgresql://agentctl:agentctl@localhost:5433/agentctl
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest httpx   # httpx: starlette TestClient (test_webhook)
      - name: Test
        run: python -m pytest -q

  go-conformance:
    name: Go data plane + golden-wire conformance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Build + conformance
        working-directory: agentctl/gateway_core
        run: |
          make build
          make conformance   # proves Python<->Go wire parity on the frozen Frame envelope
