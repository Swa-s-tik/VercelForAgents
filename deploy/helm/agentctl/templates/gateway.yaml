apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "agentctl.fullname" . }}-gateway
  labels: {{- include "agentctl.labels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
spec:
  replicas: {{ .Values.gateway.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: gateway
    spec:
      initContainers:
        - name: wait-schema
          image: {{ .Values.postgres.image }}
          command:
            - sh
            - -c
            - |
              until psql "{{ include "agentctl.pgDsn" . }}" -tAc "SELECT to_regclass('controlplane.routing_tables') IS NOT NULL" 2>/dev/null | grep -q t; do echo "waiting for schema"; sleep 2; done
      containers:
        - name: gateway
          image: {{ .Values.gateway.image }}
          imagePullPolicy: {{ .Values.gateway.pullPolicy }}
          env:
            - { name: AGENTCTL_PG_DSN, value: {{ include "agentctl.pgDsn" . | quote }} }
            - { name: AGENTCTL_PROJECT_ID, value: {{ .Values.gateway.projectId | quote }} }
            - { name: AGENTCTL_GW_PORT, value: {{ .Values.gateway.port | quote }} }
            {{- if .Values.gateway.requireKey }}
            - { name: AGENTCTL_REQUIRE_KEY, value: "1" }
            {{- end }}
          ports:
            - containerPort: {{ .Values.gateway.port }}
          readinessProbe:
            tcpSocket:
              port: {{ .Values.gateway.port }}
            initialDelaySeconds: 2
            periodSeconds: 3
          resources: {{- toYaml .Values.gateway.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "agentctl.fullname" . }}-gateway
  labels: {{- include "agentctl.labels" . | nindent 4 }}
spec:
  selector:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: gateway
  ports:
    - { port: {{ .Values.gateway.port }}, targetPort: {{ .Values.gateway.port }} }
