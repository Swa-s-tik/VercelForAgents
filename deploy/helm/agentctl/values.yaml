# agentctl Helm values. The core 3-tier (Postgres + Go gateway + Python control plane) mirrors the
# default `docker compose up` topology. Telemetry (ClickHouse/Grafana) and Qdrant remain
# compose-profile opt-ins; they're out of this core chart.

postgres:
  image: pgvector/pgvector:pg16   # superset of pg16; the pgvector state backend needs it
  user: agentctl
  password: agentctl
  db: agentctl
  # persistence is OFF by default (emptyDir) so a kind/demo cluster needs no storage class.
  # enable it for a durable Postgres; `size` is only used when enabled.
  persistence:
    enabled: false
    size: 1Gi
  resources: {}

# schema-init runs once at install (DROP+recreate is destructive, so it is NOT re-run on upgrade by
# default - which also avoids the "Job is immutable" helm upgrade error). Set runOnUpgrade=true only
# if you intend to re-apply the schema on the next upgrade (this wipes controlplane data).
schemaInit:
  runOnUpgrade: false

# images for the two agentctl services. Build + load them into your cluster (see chart README);
# pullPolicy Never keeps a local/kind cluster from trying to pull a non-published image.
controlplane:
  image: agentctl/controlplane:dev
  pullPolicy: IfNotPresent
  replicas: 1
  port: 8088
  resources: {}

gateway:
  image: agentctl/gateway:dev
  pullPolicy: IfNotPresent
  replicas: 1
  port: 50050
  projectId: "00000000-0000-0000-0000-0000000000a1"
  requireKey: false               # set true to enforce API keys at the gateway
  resources: {}

# the AgentDeployment watch-loop controller (kopf). Off by default; the image must include
# agentctl[operator]. With the CRD applied, `kubectl apply` of an AgentDeployment drives a rollout.
operator:
  enabled: false
  image: agentctl/operator:dev
  pullPolicy: IfNotPresent
  resources: {}

# require an API key on the HTTP surfaces (control plane). Default permissive (zero-config).
requireKey: false
